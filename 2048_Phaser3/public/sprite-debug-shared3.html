<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Debug — shared-0-sheet3.png</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {  color: #eee; font-family: monospace; padding: 20px; }
h1 { color: #ffe57f; margin-bottom: 10px; font-size: 20px; }
h2 { color: #ff9800; margin: 20px 0 8px; font-size: 16px; }
.info { color: #888; font-size: 12px; margin-bottom: 16px; }
.back { color: #4caf50; text-decoration: none; font-size: 13px; }
.back:hover { text-decoration: underline; }
.full-img { margin: 16px 0; border: 1px solid #444; display: block; max-width: 100%; }
.frames { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
.frame-wrap { text-align: center; }
.frame-wrap .label { color: #aaa; font-size: 11px; margin-top: 4px; line-height: 1.4; }
.frame-wrap .label .idx { color: #ffe57f; font-weight: bold; }
.frame-wrap .label .pos { color: #4caf50; }

/* 共享素材图4 128×256 */
.shared3 { background: url('assets/images/shared-0-sheet3.png') no-repeat; border: 1px solid #444; }

/* === 5个对象 — 坐标待你定位 === */
.obj-1 { background-position: 0px 0px;      width: 64px; height: 64px; }
.obj-2 { background-position: -64px 0px;    width: 64px; height: 64px; }
.obj-3 { background-position: 0px -64px;    width: 64px; height: 64px; }
.obj-4 { background-position: -64px -64px;  width: 64px; height: 64px; }
.obj-5 { background-position: 0px -128px;   width: 64px; height: 64px; }
</style>
</head>
<body>
<a class="back" href="sprite-debug-index.html">← 返回索引</a>
<h1>shared-0-sheet3.png — 共享素材 第4张</h1>
<div class="info">尺寸: 128×256px | 5个对象</div>

<h2>整图预览</h2>
<img class="full-img" src="assets/images/shared-0-sheet3.png" alt="shared-0-sheet3.png">

<h2>对象切割</h2>
<div class="frames">
  <div class="frame-wrap"><div class="shared3 obj-1"></div><div class="label"><span class="idx">对象1</span><br><span class="pos">0, 0</span></div></div>
  <div class="frame-wrap"><div class="shared3 obj-2"></div><div class="label"><span class="idx">对象2</span><br><span class="pos">-64, 0</span></div></div>
  <div class="frame-wrap"><div class="shared3 obj-3"></div><div class="label"><span class="idx">对象3</span><br><span class="pos">0, -64</span></div></div>
  <div class="frame-wrap"><div class="shared3 obj-4"></div><div class="label"><span class="idx">对象4</span><br><span class="pos">-64, -64</span></div></div>
  <div class="frame-wrap"><div class="shared3 obj-5"></div><div class="label"><span class="idx">对象5</span><br><span class="pos">0, -128</span></div></div>
</div>
</body>
</html>
