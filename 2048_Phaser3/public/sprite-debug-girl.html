<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprite Debug — girl-sheet0.png</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { color: #eee; font-family: monospace; padding: 20px; }
      h1 { color: #ffe57f; margin-bottom: 10px; font-size: 20px; }
      h2 { color: #ff9800; margin: 20px 0 8px; font-size: 16px; }
      .info { color: #888; font-size: 12px; margin-bottom: 16px; }
      .back { color: #4caf50; text-decoration: none; font-size: 13px; }
      .back:hover { text-decoration: underline; }
      .full-img { margin: 16px 0; border: 1px solid #444; display: block; max-width: 100%; }
      .frames { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
      .frame-wrap { text-align: center; }
      .frame-wrap .label { color: #aaa; font-size: 11px; margin-top: 4px; line-height: 1.4; }
      .frame-wrap .label .idx { color: #ffe57f; font-weight: bold; }
      .frame-wrap .label .pos { color: #4caf50; }

      /* 角色形象 1024×1024, 4个对象 215×250, 动画3帧 */
      .girl { background: url("assets/images/girl-sheet0.png") no-repeat; border: 1px solid #444; }

      .obj-1 { background-position: -5px -764px;   width: 215px; height: 250px; }
      .obj-2 { background-position: -773px -764px;  width: 215px; height: 250px; }
      .obj-3 { background-position: -517px -764px;  width: 215px; height: 250px; }
      .obj-4 { background-position: -773px -764px;  width: 215px; height: 250px; }
    </style>
  </head>
  <body>
    <a class="back" href="sprite-debug-index.html">← 返回索引</a>
    <h1>girl-sheet0.png — 角色形象</h1>
    <div class="info">尺寸: 1024×1024px | 4个对象 215×250px | 动画3帧</div>

    <h2>整图预览</h2>
    <img class="full-img" src="assets/images/girl-sheet0.png" alt="girl-sheet0.png" />

    <h2>对象切割</h2>
    <div class="frames">
      <div class="frame-wrap"><div class="girl obj-1"></div><div class="label"><span class="idx">对象1</span><br /><span class="pos">-5, -764</span></div></div>
      <div class="frame-wrap"><div class="girl obj-2"></div><div class="label"><span class="idx">对象2</span><br /><span class="pos">-259, -764</span></div></div>
      <div class="frame-wrap"><div class="girl obj-3"></div><div class="label"><span class="idx">对象3</span><br /><span class="pos">-517, -764</span></div></div>
      <div class="frame-wrap"><div class="girl obj-4"></div><div class="label"><span class="idx">对象4</span><br /><span class="pos">-773, -764</span></div></div>
    </div>

    <h2>动画: 3帧播放（对象2→对象3→对象1）</h2>
    <div class="frames">
      <div style="width:215px; height:250px; background:url('assets/images/girl-sheet0.png') no-repeat; border:2px solid #ffe57f; animation: girl-normal 0.75s steps(1) infinite;"></div>
    </div>
    <div class="frames" style="margin-top:4px;">
      <div class="frame-wrap"><div class="label"><span class="idx">正常 3帧</span></div></div>
    </div>
    <style>
      @keyframes girl-normal {
        0%      { background-position: -259px -764px; }
        33.33%  { background-position: -517px -764px; }
        66.67%  { background-position: -5px -764px; }
        100%    { background-position: -259px -764px; }
      }
    </style>

    <h2>动画帧顺序</h2>
    <div class="frames">
      <div class="frame-wrap"><div class="girl obj-2"></div><div class="label"><span class="idx">第1帧</span><br /><span class="pos">对象2 (-259, -764)</span></div></div>
      <div class="frame-wrap"><div class="girl obj-3"></div><div class="label"><span class="idx">第2帧</span><br /><span class="pos">对象3 (-517, -764)</span></div></div>
      <div class="frame-wrap"><div class="girl obj-1"></div><div class="label"><span class="idx">第3帧</span><br /><span class="pos">对象1 (-5, -764)</span></div></div>
    </div>

    <h2>叠加对比 — 3帧</h2>
    <div style="display:flex; gap:20px; margin-bottom:20px;">
      <div style="position:relative; width:215px; height:250px; border:2px solid red; flex-shrink:0;">
        <div id="girl-l1" class="girl obj-2" style="position:absolute; top:0; left:0; opacity:0.3;"></div>
        <div id="girl-l2" class="girl obj-3" style="position:absolute; top:0; left:0; opacity:0.3;"></div>
        <div id="girl-l3" class="girl obj-1" style="position:absolute; top:0; left:0; opacity:0.3;"></div>
      </div>
      <div style="font-size:13px; color:#333;">
        <div style="margin-bottom:8px; font-weight:bold;">3帧位置调整：</div>
        <div style="display:flex; align-items:center; margin:3px 0; gap:4px;"><input type="checkbox" checked onchange="document.getElementById('girl-l1').style.display=this.checked?'block':'none'"><span style="width:40px;">第1帧</span><input id="gx-1" type="number" value="-259" oninput="updateGirl(1)" style="width:70px; font-family:monospace; font-size:12px;"><input id="gy-1" type="number" value="-764" oninput="updateGirl(1)" style="width:70px; font-family:monospace; font-size:12px;"></div>
        <div style="display:flex; align-items:center; margin:3px 0; gap:4px;"><input type="checkbox" checked onchange="document.getElementById('girl-l2').style.display=this.checked?'block':'none'"><span style="width:40px;">第2帧</span><input id="gx-2" type="number" value="-517" oninput="updateGirl(2)" style="width:70px; font-family:monospace; font-size:12px;"><input id="gy-2" type="number" value="-764" oninput="updateGirl(2)" style="width:70px; font-family:monospace; font-size:12px;"></div>
        <div style="display:flex; align-items:center; margin:3px 0; gap:4px;"><input type="checkbox" checked onchange="document.getElementById('girl-l3').style.display=this.checked?'block':'none'"><span style="width:40px;">第3帧</span><input id="gx-3" type="number" value="-5" oninput="updateGirl(3)" style="width:70px; font-family:monospace; font-size:12px;"><input id="gy-3" type="number" value="-764" oninput="updateGirl(3)" style="width:70px; font-family:monospace; font-size:12px;"></div>
        <br>
        <button onclick="exportGirl()" style="padding:4px 12px; background:#4caf50; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:12px;">导出</button>
        <pre id="girl-output" style="margin-top:6px; padding:6px; background:#f0f0f0; border:1px solid #ccc; font-size:11px; display:none;"></pre>
      </div>
    </div>

    <script>
      function updateGirl(n) {
        var x = document.getElementById('gx-' + n).value;
        var y = document.getElementById('gy-' + n).value;
        document.getElementById('girl-l' + n).style.backgroundPosition = x + 'px ' + y + 'px';
      }
      function exportGirl() {
        var out = '';
        for (var i = 1; i <= 3; i++) {
          var x = document.getElementById('gx-' + i).value;
          var y = document.getElementById('gy-' + i).value;
          out += '第' + i + '帧: ' + x + 'px ' + y + 'px\n';
        }
        var el = document.getElementById('girl-output');
        el.textContent = out; el.style.display = 'block';
      }
    </script>
  </body>
</html>
