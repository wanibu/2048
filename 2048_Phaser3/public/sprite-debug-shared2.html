  <body>
    <a class="back" href="sprite-debug-index.html">← 返回索引</a>

    <!-- ===== 动画: 手点击 (对象8 → 对象9) ===== -->
    <h2>动画: 手点击 — 叠加对比</h2>
    <div style="display: flex; gap: 20px; margin-bottom: 20px">
      <div
        style="
          position: relative;
          width: 132px;
          height: 203px;
          border: 2px solid red;
          flex-shrink: 0;
        "
      >
        <div
          id="hand-1"
          class="shared2 obj-8"
          style="position: absolute; top: 0; left: 0; opacity: 0.5"
        ></div>
        <div
          id="hand-2"
          class="shared2 obj-9"
          style="position: absolute; top: 0; left: 0; opacity: 0.5"
        ></div>
      </div>
      <div style="font-size: 13px; color: #333">
        <div style="margin-bottom: 8px; font-weight: bold">手点击：</div>
        <div
          style="display: flex; align-items: center; margin: 3px 0; gap: 4px"
        >
          <input
            type="checkbox"
            checked
            onchange="
              document.getElementById('hand-1').style.display = this.checked
                ? 'block'
                : 'none'
            "
          /><span style="width: 40px">对象8</span
          ><input
            id="hx-1"
            type="number"
            value="-1"
            oninput="updateHand(1)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          /><input
            id="hy-1"
            type="number"
            value="-135"
            oninput="updateHand(1)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          />
        </div>
        <div
          style="display: flex; align-items: center; margin: 3px 0; gap: 4px"
        >
          <input
            type="checkbox"
            checked
            onchange="
              document.getElementById('hand-2').style.display = this.checked
                ? 'block'
                : 'none'
            "
          /><span style="width: 40px">对象9</span
          ><input
            id="hx-2"
            type="number"
            value="-130"
            oninput="updateHand(2)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          /><input
            id="hy-2"
            type="number"
            value="-239"
            oninput="updateHand(2)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          />
        </div>
        <br />
        <button
          onclick="exportHand()"
          style="
            padding: 4px 12px;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
          "
        >
          导出
        </button>
        <pre
          id="hand-output"
          style="
            margin-top: 6px;
            padding: 6px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            font-size: 11px;
            display: none;
          "
        ></pre>
      </div>
    </div>

    <h2>动画: 手点击 — 预览</h2>
    <div
      style="
        width: 132px;
        height: 203px;
        background: url(&quot;assets/images/shared-0-sheet2.png&quot;) no-repeat;
        border: 2px solid #ffe57f;
        animation: hand-anim 0.6s steps(1) infinite;
      "
    ></div>
    <style>
      @keyframes hand-anim {
        0% {
          background-position: -1px -135px;
        }
        50% {
          background-position: -130px -239px;
        }
        100% {
          background-position: -1px -135px;
        }
      }
    </style>

    <script>
      function updateHand(n) {
        var x = document.getElementById("hx-" + n).value;
        var y = document.getElementById("hy-" + n).value;
        document.getElementById("hand-" + n).style.backgroundPosition =
          x + "px " + y + "px";
      }
      function exportHand() {
        var out = "";
        for (var i = 1; i <= 2; i++) {
          var x = document.getElementById("hx-" + i).value;
          var y = document.getElementById("hy-" + i).value;
          out += "帧" + i + ": " + x + "px " + y + "px\n";
        }
        var el = document.getElementById("hand-output");
        el.textContent = out;
        el.style.display = "block";
      }
    </script>
