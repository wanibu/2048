    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        color: #eee;
        font-family: monospace;
        padding: 20px;
      }
      h1 {
        color: #ffe57f;
        margin-bottom: 10px;
        font-size: 20px;
      }

        color: #ff9800;
        margin: 20px 0 8px;
        font-size: 16px;
      }
      .info {
        color: #888;
        font-size: 12px;
        margin-bottom: 16px;
      }
      .back {
        color: #4caf50;
        text-decoration: none;
        font-size: 13px;
      }
      .back:hover {
        text-decoration: underline;
      }
      .full-img {
        margin: 16px 0;
        border: 1px solid #444;
        display: block;
        max-width: 100%;
      }
      .frames {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 12px;
      }
      .frame-wrap {
        text-align: center;
      }
      .frame-wrap .label {
        color: #aaa;
        font-size: 11px;
        margin-top: 4px;
        line-height: 1.4;
      }
      .frame-wrap .label .idx {
        color: #ffe57f;
        font-weight: bold;
      }
      .frame-wrap .label .pos {
        color: #4caf50;
      }

      /* 共享素材图3 512×1024 */
      .shared2 {
        background: url("assets/images/shared-0-sheet2.png") no-repeat;
        border: 1px solid #444;
      }

      /* === 12个对象 — 坐标待你定位 === */
      /* 播放按钮 */
      .obj-1 {
        background-position: -7px -4px;
        width: 232px;
        height: 108px;
      }
      .obj-2 {
        background-position: -262px -4px;
        width: 232px;
        height: 108px;
      }

      /* 音量按键 正常 */
      .obj-5 {
        background-position: -15px -522px;
        width: 103px;
        height: 106px;
      }
      /* 音量按键 静音 */
      .obj-4 {
        background-position: -145px -522px;
        width: 103px;
        height: 106px;
      }

      /* 暂停按钮 */
      .obj-3 {
        background-position: -275px -525px;
        width: 103px;
        height: 106px;
      }
      /* 暂停按钮 */
      .obj-6 {
        background-position: -14px -778px;
        width: 104px;
        height: 106px;
      }
      /* 旋转按钮 左侧的 逆时针转 */
      .obj-7 {
        background-position: -254px -768px;
        width: 132px;
        height: 118px;
      }

      /* 旋转按钮 右侧的 顺时针转 */
      .obj-14 {
        background-position: -254px -768px;
        width: 132px;
        height: 118px;
        transform: rotateY(180deg);
      }

      /* 手指按钮 大手势 */
      .obj-8 {
        background-position: -1px -135px;
        width: 128px;
        height: 200px;
      }
      /* 手指按钮 小手势 */
      .obj-9 {
        background-position: -130px -259px;
        width: 124px;
        height: 180px;
      }
      /*  下一个糖果 底座 */

        background-position: -260px -263px;
        width: 120px;
        height: 120px;
      }
      .obj-num {

        width: 32px;
        height: 43px;
