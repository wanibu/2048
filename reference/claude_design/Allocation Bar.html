<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Allocation Bar — 百分比分配条</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#f0eee9"/>
  <g transform="translate(14 42)">
    <rect x="0" y="0" width="72" height="16" rx="4" fill="#e0ddd4"/>
    <rect x="0" y="0" width="10" height="16" fill="#ff5d8f"/>
    <rect x="10" y="0" width="10" height="16" fill="#ff8a3c"/>
    <rect x="20" y="0" width="10" height="16" fill="#ffd23c"/>
    <rect x="30" y="0" width="10" height="16" fill="#4ecd7a"/>
    <rect x="40" y="0" width="10" height="16" fill="#3cbdff"/>
    <rect x="50" y="0" width="10" height="16" fill="#8e5dff"/>
    <rect x="60" y="0" width="12" height="16" rx="0" fill="#ff4dcc"/>
    <rect x="70" y="0" width="2" height="16" fill="#ff4d7a"/>
  </g>
</svg>
</template>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; min-height: 100vh; }
  body {
    font-family: Inter, system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    box-sizing: border-box;
  }
  .card {
    width: min(1000px, 100%);
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.08);
    overflow: hidden;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// Allocation Bar — 13 color segments that always sum to 100%.
// Drag any divider between two segments to transfer percentage
// between just those two neighbors. Minimum 2% per segment.
// ─────────────────────────────────────────────────────────────

const VALUES = [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192];

const SEG_COLORS = [
  { bg: '#ff5d8f', dark: '#c8346a' },
  { bg: '#ff3b3b', dark: '#b02424' },
  { bg: '#ff8a3c', dark: '#c85a1a' },
  { bg: '#ffd23c', dark: '#b8941d' },
  { bg: '#b5e84a', dark: '#6fa017' },
  { bg: '#4ecd7a', dark: '#1f8a47' },
  { bg: '#3cd0c0', dark: '#17867a' },
  { bg: '#3cbdff', dark: '#1b7bb5' },
  { bg: '#5a7cff', dark: '#2d47c0' },
  { bg: '#8e5dff', dark: '#5a2ec0' },
  { bg: '#c14dff', dark: '#7e1dbb' },
  { bg: '#ff4dcc', dark: '#b01c88' },
  { bg: '#ff4d7a', dark: '#b01c45' },
];

const candyText = (size = 22) => ({
  fontFamily: 'Fredoka, system-ui, sans-serif',
  fontWeight: 700,
  fontSize: size,
  color: '#fff',
  textShadow:
    '0 2px 0 rgba(0,0,0,.25),' +
    ' -1.5px -1.5px 0 rgba(0,0,0,.35), 1.5px -1.5px 0 rgba(0,0,0,.35),' +
    ' -1.5px 1.5px 0 rgba(0,0,0,.35), 1.5px 1.5px 0 rgba(0,0,0,.35)',
  lineHeight: 1,
  letterSpacing: -0.5,
});

const MIN_PCT = 2;
const N = VALUES.length;
const EVEN = () => Array(N).fill(100 / N);

function AllocationBar() {
  const [pcts, setPcts] = React.useState(EVEN);
  const [hoverIdx, setHoverIdx] = React.useState(null);
  const [dragDivider, setDragDivider] = React.useState(null);
  const trackRef = React.useRef(null);

  const onDividerDown = (i) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    setDragDivider(i);
    const el = trackRef.current;
    const r = el.getBoundingClientRect();
    const startX = e.clientX;
    const startL = pcts[i];
    const startR = pcts[i + 1];
    const total = startL + startR;

    const move = (ev) => {
      const deltaPx = ev.clientX - startX;
      const deltaPct = (deltaPx / r.width) * 100;
      let newL = startL + deltaPct;
      let newR = startR - deltaPct;
      if (newL < MIN_PCT) { newL = MIN_PCT; newR = total - MIN_PCT; }
      if (newR < MIN_PCT) { newR = MIN_PCT; newL = total - MIN_PCT; }
      setPcts((prev) => {
        const next = prev.slice();
        next[i] = newL;
        next[i + 1] = newR;
        return next;
      });
    };
    const up = () => {
      setDragDivider(null);
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  const reset = () => setPcts(EVEN());

  const total = pcts.reduce((a, b) => a + b, 0);
  const fmt = (p) => (p < 10 ? p.toFixed(1) : Math.round(p).toString());

  return (
    <div style={{ padding: '28px 36px 32px', fontFamily: 'Inter, system-ui, sans-serif', position: 'relative' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 11, color: '#9b9ba6', textTransform: 'uppercase', letterSpacing: 1.4 }}>allocation</div>
          <div style={{ ...candyText(22), color: '#2a2a33', textShadow: 'none', marginTop: 2 }}>
            Total <span style={{ fontVariantNumeric: 'tabular-nums' }}>{Math.round(total)}%</span>
          </div>
        </div>
        <button onClick={reset}
          style={{
            border: 'none', cursor: 'pointer',
            fontFamily: 'Fredoka, system-ui, sans-serif', fontWeight: 600, fontSize: 13,
            color: '#5a5a66', background: '#ececf2',
            padding: '7px 14px', borderRadius: 8,
            boxShadow: '0 1px 0 rgba(0,0,0,.04), inset 0 1px 0 rgba(255,255,255,.7)',
          }}
          onMouseEnter={(e) => (e.currentTarget.style.background = '#e0e0e8')}
          onMouseLeave={(e) => (e.currentTarget.style.background = '#ececf2')}>
          ↻ 重置
        </button>
      </div>

      <div ref={trackRef}
        style={{
          display: 'flex', borderRadius: 14, overflow: 'visible',
          height: 44, position: 'relative',
          boxShadow: 'inset 0 2px 4px rgba(0,0,0,.2), 0 2px 0 rgba(255,255,255,.5)',
          background: '#d8d8e0',
          touchAction: 'none',
        }}>
        {VALUES.map((v, i) => {
          const c = SEG_COLORS[i];
          const p = pcts[i];
          const hovered = hoverIdx === i;
          const isFirst = i === 0;
          const isLast = i === N - 1;
          const showLabel = p >= 3.2;
          return (
            <div key={v}
              onMouseEnter={() => setHoverIdx(i)}
              onMouseLeave={() => setHoverIdx((h) => (h === i ? null : h))}
              style={{
                flex: `0 0 ${p}%`,
                background: `linear-gradient(to bottom, ${c.bg}, ${c.dark})`,
                borderTopLeftRadius: isFirst ? 14 : 0,
                borderBottomLeftRadius: isFirst ? 14 : 0,
                borderTopRightRadius: isLast ? 14 : 0,
                borderBottomRightRadius: isLast ? 14 : 0,
                position: 'relative',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: hovered ? 'filter .15s' : 'flex-basis .05s linear, filter .15s',
                filter: hovered ? 'brightness(1.08)' : 'none',
                minWidth: 0,
                overflow: 'visible',
              }}>
              <div style={{
                position: 'absolute', top: 3, left: isFirst ? 6 : 2, right: isLast ? 6 : 2, height: 10,
                background: 'linear-gradient(to bottom, rgba(255,255,255,.55), rgba(255,255,255,0))',
                borderRadius: '10px 10px 50% 50%',
                pointerEvents: 'none',
              }} />

              {showLabel && (
                <div style={{ ...candyText(p > 8 ? 15 : 12), zIndex: 1, pointerEvents: 'none', whiteSpace: 'nowrap' }}>
                  {v}
                </div>
              )}

              {!isLast && (
                <div
                  onPointerDown={onDividerDown(i)}
                  style={{
                    position: 'absolute', right: -6, top: -4, bottom: -4,
                    width: 12, cursor: 'ew-resize', zIndex: 3,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                  <div style={{
                    width: 3, height: '70%', background: 'rgba(255,255,255,.75)',
                    borderRadius: 2,
                    boxShadow: dragDivider === i
                      ? '0 0 0 2px rgba(0,0,0,.25), 0 0 10px rgba(255,255,255,.8)'
                      : '0 0 0 1px rgba(0,0,0,.15)',
                    transition: 'box-shadow .12s, height .12s',
                  }} />
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ display: 'flex', marginTop: 10, position: 'relative', height: 36 }}>
        {VALUES.map((v, i) => {
          const c = SEG_COLORS[i];
          const p = pcts[i];
          const hovered = hoverIdx === i;
          return (
            <div key={v}
              style={{
                flex: `0 0 ${p}%`,
                display: 'flex', flexDirection: 'column', alignItems: 'center',
                minWidth: 0, overflow: 'visible',
                transition: 'flex-basis .05s linear',
              }}>
              <div style={{
                fontFamily: 'Fredoka, system-ui, sans-serif',
                fontWeight: 600,
                fontSize: 13,
                color: c.dark,
                lineHeight: 1,
                whiteSpace: 'nowrap',
                transform: hovered ? 'translateY(-1px)' : 'none',
                transition: 'transform .12s',
              }}>{v}</div>
              <div style={{
                fontFamily: 'Fredoka, system-ui, sans-serif',
                fontWeight: 500,
                fontSize: 11,
                color: hovered ? c.dark : '#9b9ba6',
                marginTop: 3,
                fontVariantNumeric: 'tabular-nums',
                whiteSpace: 'nowrap',
              }}>{fmt(p)}%</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="card"><AllocationBar /></div>
);
</script>
</body>
</html>
