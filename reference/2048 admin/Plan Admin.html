<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Plan Admin — 4 layouts</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
  body { font-family: Inter, system-ui, sans-serif; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="plan-admin-shared.jsx"></script>
<script type="text/babel" src="plan-admin-v1.jsx"></script>
<script type="text/babel" src="plan-admin-v234.jsx"></script>

<script type="text/babel">
const W = 1100, H = 760;
function Frame({ children }) {
  return <div style={{ width: '100%', height: '100%', background: '#f7f7fa', overflow: 'auto' }}>{children}</div>;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="admin" title="Plan 配置后台 — 4 种布局"
        subtitle="同一套数据、不同编排 · 点击任意卡片全屏查看">
        <DCArtboard id="v1" label="V1 · 原型重构（纵向 Stage 卡片）" width={W} height={H}>
          <Frame><AdminV1_Refined /></Frame>
        </DCArtboard>
        <DCArtboard id="v2" label="V2 · 左列表 + 右详情（Notion 风）" width={W} height={H}>
          <Frame><AdminV2_SplitPanel /></Frame>
        </DCArtboard>
        <DCArtboard id="v3" label="V3 · 时间轴 + 难度曲线" width={W} height={H}>
          <Frame><AdminV3_Timeline /></Frame>
        </DCArtboard>
        <DCArtboard id="v4" label="V4 · 电子表格（批量编辑）" width={W} height={H}>
          <Frame><AdminV4_Spreadsheet /></Frame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
