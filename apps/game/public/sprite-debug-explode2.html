<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprite Debug — borderexplodeanimation-sheet2.png</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        color: #eee;
        font-family: monospace;
        padding: 20px;
      }
      h1 {
        color: #ffe57f;
        margin-bottom: 10px;
        font-size: 20px;
      }
      h2 {
        color: #ff9800;
        margin: 20px 0 8px;
        font-size: 16px;
      }
      .info {
        color: #888;
        font-size: 12px;
        margin-bottom: 16px;
      }
      .back {
        color: #4caf50;
        text-decoration: none;
        font-size: 13px;
      }
      .back:hover {
        text-decoration: underline;
      }
      .full-img {
        margin: 16px 0;
        border: 1px solid #444;
        display: block;
        max-width: 100%;
      }
      .frames {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 12px;
      }
      .frame-wrap {
        text-align: center;
      }
      .frame-wrap .label {
        color: #aaa;
        font-size: 11px;
        margin-top: 4px;
        line-height: 1.4;
      }
      .frame-wrap .label .idx {
        color: #ffe57f;
        font-weight: bold;
      }
      .frame-wrap .label .pos {
        color: #4caf50;
      }

      /* 边框爆炸动画第3张 512×512 */
      .explode2 {
        background: url("assets/images/borderexplodeanimation-sheet2.png")
          no-repeat;
        border: 1px solid #444;
      }

      /* 3个对象，按页面显示顺序命名 */
      .obj-1 {
        background-position: -261px -16px;
        width: 245px;
        height: 245px;
      }
      .obj-2 {
        background-position: 2px -266px;
        width: 245px;
        height: 245px;
      }
      .obj-3 {
        background-position: -256px -277px;
        width: 245px;
        height: 245px;
      }
    </style>
    <style>
      @keyframes explode2-anim {
        0% {
          background-position: -261px -16px;
        }
        33.33% {
          background-position: 2px -266px;
        }
        66.66% {
          background-position: -256px -277px;
        }
      }
    </style>
  </head>
  <body>
    <a class="back" href="sprite-debug-index.html">← 返回索引</a>
    <h1>borderexplodeanimation-sheet2.png — 边框爆炸动画 第3张</h1>
    <div class="info">尺寸: 512×512px | 3个对象</div>

    <h2>整图预览</h2>
    <img
      class="full-img"
      src="assets/images/borderexplodeanimation-sheet2.png"
      alt="borderexplodeanimation-sheet2.png"
    />

    <h2>对象切割</h2>
    <div class="frames">
      <div class="frame-wrap">
        <div class="explode2 obj-1"></div>
        <div class="label">
          <span class="idx">帧1</span><br /><span class="pos">-258, -13</span>
        </div>
      </div>
      <div class="frame-wrap">
        <div class="explode2 obj-2"></div>
        <div class="label">
          <span class="idx">帧2</span><br /><span class="pos">2, -266</span>
        </div>
      </div>
      <div class="frame-wrap">
        <div class="explode2 obj-3"></div>
        <div class="label">
          <span class="idx">帧3</span><br /><span class="pos">-256, -261</span>
        </div>
      </div>
    </div>

    <!-- ===== 3帧叠加对比 ===== -->
    <h2>3帧叠加对比（调中心点用）</h2>
    <div style="display: flex; gap: 20px; margin-bottom: 20px">
      <div
        style="
          position: relative;
          width: 245px;
          height: 245px;
          border: 2px solid red;
          flex-shrink: 0;
        "
      >
        <div
          id="layer-1"
          class="explode2 obj-1"
          style="position: absolute; top: 0; left: 0; opacity: 0.4"
        ></div>
        <div
          id="layer-2"
          class="explode2 obj-2"
          style="position: absolute; top: 0; left: 0; opacity: 0.4"
        ></div>
        <div
          id="layer-3"
          class="explode2 obj-3"
          style="position: absolute; top: 0; left: 0; opacity: 0.4"
        ></div>
      </div>
      <div style="font-size: 13px; color: #333">
        <div style="margin-bottom: 8px; font-weight: bold">显示帧：</div>
        <div
          style="display: flex; align-items: center; margin: 3px 0; gap: 4px"
        >
          <input
            type="checkbox"
            checked
            onchange="
              document.getElementById('layer-1').style.display = this.checked
                ? 'block'
                : 'none'
            "
          /><span style="width: 40px">帧1</span
          ><input
            id="ex-1"
            type="number"
            value="-261"
            oninput="updateEx(1)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          /><input
            id="ey-1"
            type="number"
            value="-16"
            oninput="updateEx(1)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          />
        </div>
        <div
          style="display: flex; align-items: center; margin: 3px 0; gap: 4px"
        >
          <input
            type="checkbox"
            checked
            onchange="
              document.getElementById('layer-2').style.display = this.checked
                ? 'block'
                : 'none'
            "
          /><span style="width: 40px">帧2</span
          ><input
            id="ex-2"
            type="number"
            value="2"
            oninput="updateEx(2)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          /><input
            id="ey-2"
            type="number"
            value="-266"
            oninput="updateEx(2)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          />
        </div>
        <div
          style="display: flex; align-items: center; margin: 3px 0; gap: 4px"
        >
          <input
            type="checkbox"
            checked
            onchange="
              document.getElementById('layer-3').style.display = this.checked
                ? 'block'
                : 'none'
            "
          /><span style="width: 40px">帧3</span
          ><input
            id="ex-3"
            type="number"
            value="-256"
            oninput="updateEx(3)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          /><input
            id="ey-3"
            type="number"
            value="-277"
            oninput="updateEx(3)"
            style="width: 70px; font-family: monospace; font-size: 12px"
          />
        </div>
        <br />
        <button
          onclick="exportEx()"
          style="
            padding: 4px 12px;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
          "
        >
          导出
        </button>
        <pre
          id="ex-output"
          style="
            margin-top: 6px;
            padding: 6px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            font-size: 11px;
            display: none;
          "
        ></pre>
      </div>
    </div>

    <h2>连续动画预览</h2>
    <div
      style="
        width: 245px;
        height: 245px;
        background: url(&quot;assets/images/borderexplodeanimation-sheet2.png&quot;)
          no-repeat;
        border: 2px solid #ffe57f;
        animation: explode2-anim 0.5s steps(1) infinite;
      "
    ></div>

    <script>
      function updateEx(n) {
        var x = document.getElementById("ex-" + n).value;
        var y = document.getElementById("ey-" + n).value;
        document.getElementById("layer-" + n).style.backgroundPosition =
          x + "px " + y + "px";
      }
      function exportEx() {
        var out = "";
        for (var i = 1; i <= 3; i++) {
          var x = document.getElementById("ex-" + i).value;
          var y = document.getElementById("ey-" + i).value;
          out += "帧" + i + ": " + x + "px " + y + "px\n";
        }
        var el = document.getElementById("ex-output");
        el.textContent = out;
        el.style.display = "block";
      }
    </script>
  </body>
</html>
